<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">Student Details</title>
  <meta name="title" id="meta_title" content="Support a Student's Education" />
  <meta name="description" id="meta_description" content="Your donation can be the turning point in this student’s life." />
  <meta property="og:type" content="website" />
  <meta property="og:url" id="og_url" content="" />
  <meta property="og:title" id="og_title" content="Support a Student's Education" />
  <meta property="og:description" id="og_description" content="Your donation can be the turning point in this student’s life." />
  <meta property="og:image" id="og_image" content="image/logo_white.jpg" />

  <link rel="stylesheet" href="css/student.css" />
</head>
<body>

<header>
  <h1>Student Details</h1>
</header>

<div class="container" id="studentContainer" style="display: none;">
  <h1 id="s_name_header">Student Name</h1>

  <div class="info">
    <div class="student-header">
      <img id="s_image" src="" alt="Student Image" class="student-img" />
      <h1 class="Serial_number" id="s_id">ID</h1>
    </div>

    <p id="p_age"><strong>Age:</strong> <span id="s_age"></span></p>
    <p id="p_grade"><strong>Class:</strong> <span id="s_grade"></span></p>
    <p id="p_school"><strong id="s_school_label">School / College:</strong> <span id="s_school"></span></p>
    <p id="p_location"><strong>Location:</strong> <span id="s_location"></span></p>
    <p id="p_performance"><strong>Academic Performance:</strong> <span id="s_performance"></span></p>
    <p id="p_background" class="donate-section">
      <strong>Family Background:</strong> <span id="s_background"></span>
    </p>
    <h3 id="p_need" style="color: rgb(237, 250, 0); background-color: #2c3e50; padding: 10px; border-radius: 5px;">
      <strong>Help Needed:</strong> <span id="s_need"></span> <span id="s_details_wrapper">for <span id="s_details"></span></span>
    </h3>
  </div>

  <div class="donate-section">
    <h2>Support <span id="s_name_cta"></span>'s Education</h2>
    <p>"Your donation can be the turning point in this student’s life."</p>
    <a id="s_payment_link" href="qr.html" target="_blank" class="donate-btn">Donate Now</a>
  </div>

  <a href="index.html" class="donate-btn">Back to Students</a>
</div>

<div id="statusMessage" style="text-align: center; margin-top: 50px;">
  <h2>Loading student details...</h2>
</div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('id');

    document.getElementById('og_url').setAttribute("content", window.location.href);

    if (!studentId) {
      document.getElementById('statusMessage').innerHTML = '<h2>Error: No student ID provided.</h2><a href="index.html">Go Back</a>';
      return;
    }

    try {
      const response = await fetch('data/student.json');
      if (!response.ok) throw new Error('Network response was not ok');
      const students = await response.json();

      const student = students.find(s => s.id === studentId);

      if (!student) {
        document.getElementById('statusMessage').innerHTML = '<h2>Student not found.</h2><a href="index.html">Go Back</a>';
        return;
      }

      const fallbackImg = (student.gender && (student.gender.toLowerCase() === 'female' || student.gender.toLowerCase() === 'girl')) 
        ? 'image/girl.png' 
        : 'image/boy.png';

      document.getElementById('pageTitle').textContent = `${student.name} - Details`;
      
      document.getElementById('meta_title').setAttribute("content", `Support ${student.name}'s Education`);
      document.getElementById('meta_description').setAttribute("content", `Help ${student.name} from ${student.location} with their education. Need: ${student.need} for ${student.details}.`);

      document.getElementById('og_title').setAttribute("content", `Support ${student.name}'s Education`);
      document.getElementById('og_description').setAttribute("content", `Help ${student.name} from ${student.location} with their education. Need: ${student.need} for ${student.details}.`);
      
      if(student.image) {
        document.getElementById('og_image').setAttribute("content", window.location.origin + "/" + student.image);
      } else {
        document.getElementById('og_image').setAttribute("content", window.location.origin + "/" + fallbackImg);
      }

      document.getElementById('s_name_header').textContent = student.name;
      document.getElementById('s_name_cta').textContent = student.name;
      document.getElementById('s_id').textContent = student.id;
      
      const updateField = (fieldId, parentId, data) => {
        if (data && data.toString().trim() !== '') {
          document.getElementById(fieldId).textContent = data;
          document.getElementById(parentId).style.display = '';
        } else {
          document.getElementById(parentId).style.display = 'none';
        }
      };

      updateField('s_age', 'p_age', student.age);
      updateField('s_grade', 'p_grade', student.grade);
      updateField('s_location', 'p_location', student.location);
      updateField('s_performance', 'p_performance', student.performance);
      updateField('s_background', 'p_background', student.background);
      
      if (student.school && student.school.trim() !== '') {
        const schoolLabel = document.getElementById('s_school_label');
        const schoolData = student.school.toLowerCase();
        if (schoolData.includes('college')) {
          schoolLabel.textContent = 'College:';
        } else if (schoolData.includes('school')) {
          schoolLabel.textContent = 'School:';
        } else {
          schoolLabel.textContent = 'School / College:';
        }
        document.getElementById('s_school').textContent = student.school;
        document.getElementById('p_school').style.display = '';
      } else {
        document.getElementById('p_school').style.display = 'none';
      }

      if (student.need || student.details) {
        if (student.need) {
          document.getElementById('s_need').textContent = student.need;
        }
        if (student.details) {
          document.getElementById('s_details').textContent = student.details;
          document.getElementById('s_details_wrapper').style.display = '';
        } else {
          document.getElementById('s_details_wrapper').style.display = 'none';
        }
        document.getElementById('p_need').style.display = '';
      } else {
        document.getElementById('p_need').style.display = 'none';
      }
      
      const imgElement = document.getElementById('s_image');
      imgElement.src = student.image || fallbackImg;
      imgElement.alt = student.name;
      imgElement.onerror = function() {
        this.onerror = null;
        this.src = fallbackImg;
      };

      document.getElementById('s_payment_link').href = "qr.html";

      document.getElementById('statusMessage').style.display = 'none';
      document.getElementById('studentContainer').style.display = 'block';

    } catch (error) {
      document.getElementById('statusMessage').innerHTML = '<h2>Failed to load data. Please try again.</h2>';
    }
  });
</script>

</body>
</html>
