<!DOCTYPE html>
<html lang="EN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Educational Donation Fund - Living Hope Charitable Trust</title>
  
  <meta name="description" content="Join the 2026 Educational Fundraising by Living Hope Charitable Trust. Empower a child's future. Give with heart and save on tax with 80G tax exemption.">
  <meta name="keywords" content="Educational Donation, Charity, Living Hope Charitable Trust, Sponsor a Child, Future Sparks, 80G Tax Exemption, NGO">
  <meta name="author" content="Living Hope Charitable Trust">
  
  <meta property="og:type" content="website">
  <meta property="og:title" content="Educational Donation Fund - Living Hope Charitable Trust">
  <meta property="og:description" content="Join the 2025 Educational Fundraising. Empower a child's future and get 80G tax exemption on your generous donation.">
  <meta property="og:image" content="image/thumbline.png">
  <meta property="og:url" content="https://living-hope-charitable-education-website-liart.vercel.app/">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Educational Donation Fund - Living Hope Charitable Trust">
  <meta name="twitter:description" content="Join the 2025 Educational Fundraising. Empower a child's future and get 80G tax exemption.">
  <meta name="twitter:image" content="image/thumbline.png">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div id="mainContent">
    <header>
      <img src="image/logo_white.jpg" alt="logo" class="logo">
      <div class="logo-text">
        <h1 style="font-size: 1.3rem;">Living Hope Charitable Trust</h1>
        <strong class="spark-text">FUTURE SPARKS</strong>
        <p>Join the 2025 Educational Fundraising | Empower a Child's Future</p>
        <a href="tel:9500561937" class="donate-btn" style="background-color:#e7681b;">CONTACT US</a>
      </div>
    </header>
    
    <div class="scroll-text">
      <p>Give with Heart, Save on Tax! Your generous donation comes with the added benefit of 80G tax exemption</p>
    </div>

    <section>
      <div class="wrapper">
        <h2>Students in Need</h2>
        <div class="card-container" id="studentCards">
          <p style="text-align: center; width: 100%;">Loading student data...</p>
        </div>
      </div>
    </section>
  </div>

  <script>
    async function fetchStudentData() {
      try {
        const response = await fetch('data/student.json');
        
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }
        
        const allStudents = await response.json();
        const activeStudents = allStudents.filter(student => student.status !== 'inactive');
        generateStudentCards(activeStudents);

      } catch (error) {
        console.error('Error fetching student data:', error);
        document.getElementById("studentCards").innerHTML = '<p style="text-align: center; color: red;">Failed to load student data. Please try again later.</p>';
      }
    }
    
    function generateStudentCards(students) {
      const container = document.getElementById("studentCards");
      container.innerHTML = ''; 

      students.forEach(student => {
        const card = document.createElement("a");
        card.classList.add("student-card");
        card.href = `student.html?id=${student.id}`;

        const fallbackImg = (student.gender && (student.gender.toLowerCase() === 'female' || student.gender.toLowerCase() === 'girl')) 
          ? 'image/girl.png' 
          : 'image/boy.png';

        card.innerHTML = `
          <img src="${student.image}" alt="${student.name}" class="student-img" onerror="this.onerror=null; this.src='${fallbackImg}';">
          <h3>${student.name}</h3>
          <p><strong>Age:</strong> ${student.age}</p>
          <p><strong>Class:</strong> ${student.grade}</p>
          <p><strong>Location:</strong> ${student.location}</p>
          <p><strong class="spark-text" style="color:white; font-size: 2rem;">Need:${student.need}</strong></p>
          <p>(${student.details})</p>
        `;
        container.appendChild(card);
      });
    }

    window.onload = fetchStudentData;
  </script>
</body>
</html>
